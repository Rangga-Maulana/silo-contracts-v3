name: VERSION

on:
  pull_request:
    branches:
      - main
      - master
      - develop
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-ref-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  check-version:
    name: Check constants for regular PRs
    runs-on: ubuntu-latest
    
    # Only run if PR is NOT from release/* or hotfix/* branch
    if: |
      !startsWith(github.event.pull_request.head.ref, 'release/') &&
      !startsWith(github.event.pull_request.head.ref, 'hotfix/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Need full history for tag comparison
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install packaging
      
      - name: Check VERSION constants
        env:
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          python3 scripts/check-version-constants.py regular

