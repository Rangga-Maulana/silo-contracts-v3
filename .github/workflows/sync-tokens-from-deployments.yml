# Adds missing ERC20 tokens from new Silo configs to common/addresses when opening
# a release/* or hotfix/* PR to master. Pushes a commit to the PR branch (triggers CI again).
name: Sync tokens to common addresses

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - master

env:
  RPC_MAINNET: ${{ secrets.RPC_MAINNET }}
  RPC_ARBITRUM_ONE: ${{ secrets.RPC_ARBITRUM }}
  RPC_OPTIMISM: ${{ secrets.RPC_OPTIMISM }}
  RPC_ANVIL: ${{ secrets.RPC_ANVIL }}
  RPC_SONIC: ${{ secrets.RPC_SONIC }}
  RPC_AVALANCHE: ${{ secrets.RPC_AVALANCHE }}
  RPC_INJECTIVE: ${{ secrets.RPC_INJECTIVE }}
  RPC_BNB: ${{ secrets.RPC_BNB }}
  RPC_BASE: ${{ secrets.RPC_BASE }}
  RPC_OKX: ${{ secrets.RPC_OKX }}
  RPC_XDC: ${{ secrets.RPC_XDC }}
  RPC_MANTLE: ${{ secrets.RPC_MANTLE }}
  RPC_MEGAETH: ${{ secrets.RPC_MEGAETH }}

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-ref-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  sync-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    if: |
      github.event.pull_request.base.ref == 'master' &&
      (startsWith(github.event.pull_request.head.ref, 'release/') ||
       startsWith(github.event.pull_request.head.ref, 'hotfix/'))

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Skip if deployments file unchanged vs base
        id: deployments-diff
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}"..HEAD -- \
            silo-core/deploy/silo/_siloDeployments.json | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to _siloDeployments.json vs PR base; skipping sync."
          fi

      - name: Set up Python
        if: steps.deployments-diff.outputs.changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install web3
        if: steps.deployments-diff.outputs.changed == 'true'
        run: pip install web3

      - name: Sync tokens from new Silo configs
        if: steps.deployments-diff.outputs.changed == 'true'
        run: |
          python3 scripts/sync_tokens_from_deployments.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head HEAD \
            --summary sync_tokens_summary.json

      - name: Check for address file changes
        if: steps.deployments-diff.outputs.changed == 'true'
        id: diff
        run: |
          if git diff --quiet -- common/addresses/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.deployments-diff.outputs.changed == 'true' && steps.diff.outputs.has_changes == 'true'
        id: commit
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add common/addresses/
          SYMS=$(jq -r '[.added[].symbol] | unique | join(", ")' sync_tokens_summary.json)
          git commit -m "chore: add new tokens to whitelist" -m "$SYMS"
          git push origin "HEAD:${BRANCH}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build sticky comment
        if: steps.deployments-diff.outputs.changed == 'true' && steps.diff.outputs.has_changes == 'true'
        run: |
          {
            echo "## Automatically added tokens to whitelist"
            echo ""
            echo "The following entries were added to \`common/addresses\`:"
            echo ""
            jq -r '.added[] | "- **\(.chain):** `\(.symbol)` → `\(.address)`"' sync_tokens_summary.json
            echo ""
            echo "Commit: [\`${{ steps.commit.outputs.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ steps.commit.outputs.sha }})"
          } > sync_tokens_comment.md

      - name: Post sticky comment on PR
        if: steps.deployments-diff.outputs.changed == 'true' && steps.diff.outputs.has_changes == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: sync-tokens-whitelist
          path: sync_tokens_comment.md
