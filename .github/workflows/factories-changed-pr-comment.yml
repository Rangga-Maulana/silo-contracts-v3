# When any observed contract deployment changes (see OBSERVED_CONTRACTS in
# scripts/changed_factories_pr_comment.py), post or update a single comment on the PR.
# The comment is updated on each push (same comment, not a new one).

name: Factories changed – PR comment

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - silo-core/deployments/**
      - silo-vaults/deployments/**
      - silo-oracles/deployments/**
      - scripts/changed_factories_pr_comment.py
      - .github/workflows/factories-changed-pr-comment.yml

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-ref-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  comment-factories-changed:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate comment body
        id: comment
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"
          python3 scripts/changed_factories_pr_comment.py --base "$BASE" --head "$HEAD" --format comment > factories_comment.md
          if [ -s factories_comment.md ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Post or update comment on PR
        if: steps.comment.outputs.has_changes == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: factories-changed
          path: factories_comment.md
