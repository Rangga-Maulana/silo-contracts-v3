name: VERSION-release-hotfix

on:
  pull_request:
    branches:
      - main
      - master
      - develop
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('version-release-hotfix-pr-{0}', github.event.pull_request.number) || format('version-release-hotfix-ref-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  check-version:
    name: Check constants for release/hotfix PRs
    runs-on: ubuntu-latest
    
    # Only run if PR is from release/* or hotfix/* branch
    if: |
      startsWith(github.event.pull_request.head.ref, 'release/') ||
      startsWith(github.event.pull_request.head.ref, 'hotfix/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Need full history for tag comparison
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install packaging
      
      - name: Check VERSION constants
        env:
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          python3 scripts/check-version-constants.py release-hotfix

