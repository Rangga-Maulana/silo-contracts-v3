# Check deployment contract verification on block explorers.
# Runs whenever deployments change (PR or push to master). Never fails CI.
# One job per chain – comment out a chain to skip it (then update next job's needs).
# Jobs run sequentially via needs. Each job uploads its JSON as artifact;
# aggregate job downloads all, merges with merge_verification_reports.py, posts PR comment.

name: Code verification

on:
  push:
    branches: [master]
    paths:
      - silo-core/deployments/**
      - silo-core/broadcast/**
      - silo-oracles/deployments/**
      - silo-oracles/broadcast/**
      - silo-vaults/deployments/**
      - silo-vaults/broadcast/**
  pull_request:
    types: [opened, synchronize]
    paths:
      - silo-core/deployments/**
      - silo-core/broadcast/**
      - silo-oracles/deployments/**
      - silo-oracles/broadcast/**
      - silo-vaults/deployments/**
      - silo-vaults/broadcast/**
      - scripts/check_deployments_verified_on_explorer.py
      - scripts/merge_verification_reports.py
      - .github/workflows/check-deployments-verified-on-explorer.yml

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-ref-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

env:
  ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
  ETHERSCAN_API_KEY_OKX: ${{ secrets.ETHERSCAN_API_KEY_OKX }}
  VERIFIER_URL_MEGAETH: ${{ secrets.VERIFIER_URL_MEGAETH }}
  VERIFIER_URL_MEGAETH_SCOUT: ${{ secrets.VERIFIER_URL_MEGAETH_SCOUT }}

jobs:
  verify-arbitrum_one:
    name: arbitrum_one
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain arbitrum_one --no-fail --output-json-file verification_arbitrum_one.json || true
          test -f verification_arbitrum_one.json || echo '{"sections":[]}' > verification_arbitrum_one.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-arbitrum_one
          path: verification_arbitrum_one.json

  verify-avalanche:
    name: avalanche
    needs: [verify-arbitrum_one]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain avalanche --no-fail --output-json-file verification_avalanche.json || true
          test -f verification_avalanche.json || echo '{"sections":[]}' > verification_avalanche.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-avalanche
          path: verification_avalanche.json

  verify-base:
    name: base
    needs: [verify-avalanche]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain base --no-fail --output-json-file verification_base.json || true
          test -f verification_base.json || echo '{"sections":[]}' > verification_base.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-base
          path: verification_base.json

  verify-bnb:
    name: bnb
    needs: [verify-base]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain bnb --no-fail --output-json-file verification_bnb.json || true
          test -f verification_bnb.json || echo '{"sections":[]}' > verification_bnb.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-bnb
          path: verification_bnb.json

  verify-injective:
    name: injective
    needs: []
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain injective --no-fail --output-json-file verification_injective.json || true
          test -f verification_injective.json || echo '{"sections":[]}' > verification_injective.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-injective
          path: verification_injective.json

  verify-mainnet:
    name: mainnet
    needs: [verify-bnb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain mainnet --no-fail --output-json-file verification_mainnet.json || true
          test -f verification_mainnet.json || echo '{"sections":[]}' > verification_mainnet.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-mainnet
          path: verification_mainnet.json

  verify-optimism:
    name: optimism
    needs: [verify-mainnet]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain optimism --no-fail --output-json-file verification_optimism.json || true
          test -f verification_optimism.json || echo '{"sections":[]}' > verification_optimism.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-optimism
          path: verification_optimism.json

  verify-okx:
    name: okx
    needs: []
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain okx --no-fail --output-json-file verification_okx.json || true
          test -f verification_okx.json || echo '{"sections":[]}' > verification_okx.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-okx
          path: verification_okx.json

  verify-sonic:
    name: sonic
    needs: [verify-optimism]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain sonic --no-fail --output-json-file verification_sonic.json || true
          test -f verification_sonic.json || echo '{"sections":[]}' > verification_sonic.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-sonic
          path: verification_sonic.json

  verify-xdc:
    name: xdc
    needs: [verify-sonic]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain xdc --no-fail --output-json-file verification_xdc.json || true
          test -f verification_xdc.json || echo '{"sections":[]}' > verification_xdc.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-xdc
          path: verification_xdc.json

  verify-mantle:
    name: mantle
    needs: [verify-xdc]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain mantle --no-fail --output-json-file verification_mantle.json || true
          test -f verification_mantle.json || echo '{"sections":[]}' > verification_mantle.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-mantle
          path: verification_mantle.json

  verify-megaeth:
    name: megaeth
    needs: [verify-mantle]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python3 scripts/check_deployments_verified_on_explorer.py --chain megaeth --no-fail --output-json-file verification_megaeth.json || true
          test -f verification_megaeth.json || echo '{"sections":[]}' > verification_megaeth.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-megaeth
          path: verification_megaeth.json

  aggregate-and-comment:
    name: Aggregate and comment
    needs: [verify-mantle, verify-megaeth, verify-injective, verify-okx]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: verification-*
          path: verification-artifacts
      - run: |
          python3 scripts/merge_verification_reports.py \
            --artifacts-dir verification-artifacts \
            --pr-comment-from-gh \
            -o pr_comment.md
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: deployment-verification
          path: pr_comment.md
